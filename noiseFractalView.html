<!DOCTYPE html>
<html>
<head>
<title>Noise Fractal View</title>
<script src="myRandom.js"></script>
<script src="noise.js"></script>
<script src="noiseFractal.js"></script>
<script src="ui.js"></script>
<script src="myRandom_ui.js"></script>
<script src="noise_ui.js"></script>
<script src="noiseFractal_ui.js"></script>
<script src="automation.js"></script>
<script src="img.js"></script>
<script src="color.js"></script>
<script src="mathutils.js"></script>
<script>
	class FractalViewerBase {
		constructor() {
			this.fractal = undefined;
			this.nz = 0.0;
			this.pixelSize = 0.01;
		}

		setFractal(fractal) {
			this.fractal = fractal;
		}

		getZ() {
			return this.nz;
		}

		setZ(z) {
			this.nz = z;
		}

		resetZ() {
			this.nz = 0.0;
		}

		updateZ() {
			this.nz += this.pixelSize;
		}

		getPixelSize() {
			return this.pixelSize;
		}

		setPixelSize(s) {
			this.pixelSize = s;
		}

		getValAt(x, y) {
			return this.fractal.getValueAt(x, y, this.nz);
		}
	}

	// View the computed fractal value directly (as a banded shade of gray with maroon for the band around zero)
	class FractalView extends FractalViewerBase {
		constructor() {
			super();
		}

		draw(img) {
			const numBands = 33;
			const bandWidth = 2.0/numBands;
			let pixelIndex = 0;
			let ny = img.cy * this.pixelSize;
			for (let y = 0; y < img.height(); ++y) {
				let nx = -(img.cx) * this.pixelSize;
				for (let x = 0; x < img.width(); ++x) {
					const nv = this.getValAt(nx, ny);
					if (nv < -0.01 || nv > 0.01) {
						const band = ( (numBands - 1)/2 + (nv > 0.0 ? nv + bandWidth/2.0 : nv - bandWidth/2.0)/bandWidth ) >> 0;
						const primaryBand = (band / 3) >> 0;
						const secondaryBand = band % 3;
						const shade = to8Bit(
							(0.25 + 0.5*(primaryBand / (numBands/3))) +
							(secondaryBand - 1)*0.1
						);
						img.colorPixel(pixelIndex, [shade>>0, shade>>0, shade>>0, 255]);
					}
					else {
						img.colorPixel(pixelIndex, [128, 0, 0, 255]);
					}
					pixelIndex += 4;
					nx += this.pixelSize;
				}
				ny -= this.pixelSize;
			}
		}
	}

	// Use the computed fractal value (from two offset points, one for X and one for Y) to distort
	// the position of the original point.
	class FractalDistortImage extends FractalViewerBase {
		constructor() {
			super();
		}

		draw(img) {
			let pixelIndex = 0;
			let ny = img.cy * this.pixelSize;
			for (let y = 0; y < img.height(); ++y) {
				let nx = -(img.cx) * this.pixelSize;
				for (let x = 0; x < img.width(); ++x) {
					const nvX = this.getValAt(nx, ny);
					const nvY = this.getValAt(37.0 + nx, -54.0 + ny);
					const px = nx + nvX;
					const py = ny + nvY;
					// checkerboard pattern with frequency 10
					const xFrac = ((px * 5) - Math.floor(px * 5));
					const yFrac = ((py * 5) - Math.floor(py * 5));
					// non-antialiased
					// const xVal = (xFrac > 0.01 && xFrac < 0.49) ? -1 : ((xFrac > 0.51 && xFrac < 0.99) ? 1 : 0);
					// const yVal = (yFrac > 0.01 && yFrac < 0.49) ? -1 : ((yFrac > 0.51 && yFrac < 0.99) ? 1 : 0);
					// antialiased
					const xVal = -bridge(xFrac*100, 1.0, 49.0) + bridge(xFrac*100, 51.0, 99.0);
					const yVal = -bridge(yFrac*100, 1.0, 49.0) + bridge(yFrac*100, 51.0, 99.0);
					const xyProd = xVal * yVal;
					if (xyProd < 0) {
						// xFrac < 0.49 and yFrac > 0.51 or vice-versa
						const color = roundColor(fadeColor([32, 32, 64], [170, 128, 200], -xyProd));
						color.push(255);
						img.colorPixel(pixelIndex, color);
					}
					else if (xyProd > 0) {
						// xFrac & yFrac are both < 0.49 or both > 0.51
						const color = roundColor(fadeColor([32, 32, 64], [96, 96, 160], xyProd));
						color.push(255);
						img.colorPixel(pixelIndex, color);
					}
					else { // zero
						// xFrac and/or yFrac is between 0.49 and 0.51 -- border-color
						img.colorPixel(pixelIndex, [32, 32, 64, 255]);
					}
					pixelIndex += 4;
					nx += this.pixelSize;
				}
				ny -= this.pixelSize;
			}
		}
	}

	let noise;
	let fractal;
	let fractalValueView;
	let fractalImageDistort;
	let viewer;
	let img;

	function initImage() {
		img = new Img('noiseFractal');
	}

	function initViewers() {
		fractal = new NoiseFractal();
		fractalValueView = new FractalView();
		fractalImageDistort = new FractalDistortImage();

		const numGradients = Number(ui.noiseSize.getContent());
		noise = new Noise(numGradients);

		fractal.setNoise(noise);
		fractal.setOctaves(Number(ui.numOctaves.getContent())>>0);
		fractal.setBaseFreq(Number(ui.baseFreq.getContent()));
		fractal.setOctaveFreqFactor(Number(ui.freqFactor.getContent()));
		fractal.setBaseAmpl(Number(ui.baseAmpl.getContent()));
		fractal.setOctaveAmplFactor(Number(ui.amplFactor.getContent()));
		fractal.setScaleFactor(Number(ui.scaleFactor.getContent()));

		fractalValueView.setFractal(fractal);
		fractalValueView.resetZ();
		fractalImageDistort.setFractal(fractal);
		fractalImageDistort.resetZ();

		const pixelSize = 2.0 / Math.min(img.width(), img.height());
		fractalValueView.setPixelSize(pixelSize);
		fractalImageDistort.setPixelSize(pixelSize);

		viewer = fractalValueView;
		ui.viewerButtons.selectButtonWithAttribute('value', 'value');
	}

	function clearScene() {
		img.clear([0, 0, 0, 255]);
		img.drawToCanvas();
	}

	function drawScene() {
		viewer.draw(img);
		img.drawToCanvas();
	}
	
	function applyRandomSeedAndRedraw(seed) {
		runner.stop();
		sMyRandom(seed);
		const numGradients = Number(ui.noiseSize.getContent());
		noise = new Noise(numGradients);
		fractal.setNoise(noise);
		drawScene();
	}

	function refreshNoiseAndRedraw() {
		runner.stop();
		const numGradients = Number(ui.noiseSize.getContent());
		noise = new Noise(numGradients);
		fractal.setNoise(noise);
		drawScene();
	}

	function refreshFractalAndRedraw() {
		runner.stop();
		fractal.setOctaves(Number(ui.numOctaves.getContent())>>0);
		fractal.setBaseFreq(Number(ui.baseFreq.getContent()));
		fractal.setOctaveFreqFactor(Number(ui.freqFactor.getContent()));
		fractal.setBaseAmpl(Number(ui.baseAmpl.getContent()));
		fractal.setOctaveAmplFactor(Number(ui.amplFactor.getContent()));
		fractal.setScaleFactor(Number(ui.scaleFactor.getContent()));
		fractalValueView.resetZ();
		fractalImageDistort.resetZ();
		drawScene();
	}

	function setZVal() {
		fractalValueView.setZ(Number(ui.zValue.getContent()));
		fractalImageDistort.setZ(Number(ui.zValue.getContent()));
		if (!runner.running()) {
			drawScene();
		}
	}

	function updateZAndDraw() {
		z = viewer.getZ();
		z += viewer.getPixelSize();
		ui.zValue.setContent(z);
		fractaValueView.setZ(z);
		fractaImageDistort.setZ(z);
		drawScene();
	}

	function viewerChanged(event) {
		if (event.target.name == 'viewer_type') {
			if (event.target.value == 'value') {
				viewer = fractalValueView;
			} else if (event.target.value == 'distort') {
				viewer = fractalImageDistort;
			} else {
				ui.viewerButtons.selectButtonWithAttribute('value', 'value');
				viewer = fractalValueView;
			}
		}
		drawScene();
	}

	let ui = {};
	let runner;

	function startRunning() {
		runner.start();
	}

	function stopRunning() {
		runner.stop();
	}

	function updateGoButton() {
		if (runner.running()) {
			ui.goStopButton.updateState('Stop', stopRunning); // cannot pass runner.stop here
		} else {
			ui.goStopButton.updateState('Run', startRunning); // cannot pass runner.start here
		}
	}

	function buildUI() {
		const randomDiv = uiRandomDiv(ui, applyRandomSeedAndRedraw);
		const noiseDiv = uiNoiseDiv(ui, refreshNoiseAndRedraw);
		const noiseFractalDiv = uiNoiseFractalDiv(ui, refreshFractalAndRedraw);
		ui.zValue = new TextEntry('textField', 'zVal', 0.0, 'Z-value for noise (x & y from pixel)');
		ui.updateZButton = new PushButton('button', 'updateZ', 'Update Z', setZVal);
		ui.goStopButton = new PushButton('button', 'go_stop', '');
		viewerLabel = document.createElement('span');
		viewerLabel.innerHTML = "Viewer type: ";
		ui.viewerButtons = new RadioButtonGroup(
                        'radiobutton',
                        'viewer_type',
                        [
                                {'id': 'value_rb', 'text': 'Fractal Value', 'value': 'value'},
                                {'id': 'distort_rb', 'text': 'Distorted Image', 'value': 'distort'}
                        ],
                        viewerChanged);

		const controlsDiv = document.getElementById('controls');
		controlsDiv.appendChild(randomDiv);
		controlsDiv.appendChild(noiseDiv);
		controlsDiv.appendChild(noiseFractalDiv);
		controlsDiv.appendChild(document.createElement('br'));
		ui.zValue.appendToElement(controlsDiv);
		ui.updateZButton.appendToElement(controlsDiv);
		ui.goStopButton.appendToElement(controlsDiv);
		controlsDiv.appendChild(document.createElement('br'));
		controlsDiv.appendChild(document.createElement('br'));
		controlsDiv.appendChild(viewerLabel);
		ui.viewerButtons.appendToElement(controlsDiv);

		runner = new Runner(updateGoButton, updateGoButton, updateZAndDraw, 500, undefined);
	}

	function initFromParams() {
	}
	
	window.onload = function() {
		buildUI();
		initFromParams();
		updateGoButton();
		initImage();
		initViewers();
		clearScene();
		drawScene();
	}
</script>
<style>
	* {
		font-family: sans-serif;
		background-color: #222222;
		color: #aaaaaa;
		margin: 2px;
	}
	.button {
		background-color: #444444;
		border: 1px solid #aaaaaa;
		padding: 5px 10px;
		border-radius: 4px;
	}
	.button:hover {
		background-color: #555555;
	}
	.button:active {
		background-color: #666666;
	}
	div.horiz {
		float: left;
	}
	label.rb_label {
		margin-right: 10px;
	}
</style>
</head>
<body>
	<h1>Noise Fractal</h1>
	<div class="horiz" id="canvas">
		<canvas width="800" height="600" id="noiseFractal"></canvas>
	</div>
	<div class="horiz" id="controls">
	</div>
</body>
</html>

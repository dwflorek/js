<html>
<head>
<title>Orbit</title>
<script src="mathUtils.js"></script>
<script src="img.js"></script>
<script src="color.js"></script>
<script src="automation.js"></script>
<script>
	let img = null;
	let traces = [];

	class Tuple {
		constructor(v1, v2) {
			this.v1 = v1;
			this.v2 = v2;
		}

		first() {
			return this.v1;
		}

		second() {
			return this.v2;
		}
	}

	class SinCos {
		constructor(nDivs) {
			this.nDivs = nDivs;
			this.sincoss = [];
			const dAng = 2*Math.PI / nDivs;
			let ang = 0.0;
			for (let i = 0; i < nDivs; ++i) {
				this.sincoss.push(new Tuple(Math.sin(ang), Math.cos(ang)));
				ang += dAng;
			}
		}
		
		getIndex(degrees) {
			let idx = undefined;
			if (degrees < 0) {
				degrees = -degrees;
				idx = (degrees * this.nDivs / 360.0) >> 0;
				idx = idx % this.nDivs;
				if (idx > 0) {
					idx = this.nDivs - idx;
				}
			}
			else {
				idx = (degrees * this.nDivs / 360.0) >> 0;
				idx = idx % this.nDivs;
			}
			return idx;
		}

		getSin(degrees) {
			const idx = this.getIndex(degrees);
			return this.sincoss[idx].first();
		}

		getCos(degrees) {
			const idx = this.getIndex(degrees);
			return this.sincoss[idx].second();
		}

		getSinCos(degrees) {
			const idx = this.getIndex(degrees);
			return this.sincoss[idx];
		}
	}

	class Orbit {
		constructor(r, initDegrees, revsPerSec, sincosServer) {
			this.r = r;
			this.degrees = initDegrees;
			this.degsPerSec = revsPerSec * 360.0;
			this.scServer = sincosServer;
		}

		update(dt) {
			this.degrees += this.degsPerSec * dt;
		}

		getPos() {
			const sincos = this.scServer.getSinCos(-this.degrees);
			return [this.r * sincos.second(), this.r * sincos.first()];
		}

		getPosAtDegOffset(degs) {
			const sincos = this.scServer.getSinCos(-this.degrees + degs);
			return [this.r * sincos.second(), this.r * sincos.first()];
		}
	}

	class Point {
		constructor(orbit, color, trailDegs) {
			this.orbit = orbit;
			this.color = color;
			this.imgPos = [0, 0];
			this.trailDegs = trailDegs;
			this.trailPoints = [];
			this.updatePrinted = false;
			this.drawPrinted = false;
		}

		update(dt, img) {
			this.orbit.update(dt);

			const imgCenter = img.center();
			const halfWidth = imgCenter[0];
			const pos = this.orbit.getPos();
			this.imgPos = [
				imgCenter[0] + pos[0]*halfWidth,
				imgCenter[1] - pos[1]*halfWidth
			];

			const trailLength = this.trailDegs * Math.PI/180.0 * this.orbit.r * halfWidth;
			const degsPerPt = this.trailDegs / trailLength;
			this.trailPoints = [];
			let d = 0.0;
			for (let p = 0; p < trailLength; p++) {
				const trailPos = this.orbit.getPosAtDegOffset(d);
				this.trailPoints.push([
					imgCenter[0] + trailPos[0]*halfWidth,
					imgCenter[1] - trailPos[1]*halfWidth
				]);
				d = d + degsPerPt;
			}
		}

		draw(img) {
			//img.drawSquare(this.imgPos[0], this.imgPos[1], 10, this.color);
			img.drawCircle(this.imgPos[0], this.imgPos[1], 5, this.color);
			for (let idx = 0; idx < this.trailPoints.length; ++idx) {
				const trailPoint = this.trailPoints[idx];
				this.color[3] = 255*(1.0 - idx/this.trailPoints.length);
				img.drawSquare(trailPoint[0], trailPoint[1], 2, this.color);
				this.color[3] = 255;
			}
		}
	}


	const sincosServer = new SinCos(3600);
	let points = [];

	function polarOf(x, y, img) {
		const imgCenter = img.center();
		const halfWidth = imgCenter[0];
		const px = (x - imgCenter[0]) / halfWidth;
		const py = (imgCenter[1] - y) / halfWidth;  // keep aspect-ratio square, horiz -1 -> 1, vert -h/w -> h/w
		return [ Math.sqrt(px*px + py*py), Math.atan2(py, px) ];
	}

	function randomColor() {
		return hsvToRgb(randomOn(0.0, 1.0), randomOn(0.7, 1.0), 1.0);
	}

	function repopulate() {
		points = [];
		const numPoints = randomOn(20, 100) >> 0;
		let i = 0;
		while (i < numPoints) {
			// distribute points uniformly across the plane
			const x = randomOn(0, img.width()) >> 0;
			const y = randomOn(0, img.height()) >> 0;
			const polar = polarOf(x, y, img);
			const r = polar[0];
			const degs = polar[1] * 180.0/Math.PI;
			if (r < 0.1) {
				// not too fast / close-to-center
				continue;
			}
			const revsPerSec = ((1.0 / r) / 10.0) * randomOn(0.9, 1.1);
			const orbit = new Orbit(r, degs, revsPerSec, sincosServer);
			const color = randomColor();
			const color8Bit = [to8Bit(color[0]), to8Bit(color[1]), to8Bit(color[2]), 255];
			const trailDegs = randomOn(60, 180);
			points.push(new Point(orbit, color8Bit, trailDegs));
			i += 1;
		}
	}

	let prevT = Date.now();
	let runner = null;
	let updating = false;

	function update(img) {
		const t = Date.now();
		const dt = (t - prevT)/1000.0;
		for (let idx = 0; idx < points.length; ++idx) {
			points[idx].update(dt, img);
		}
		prevT = t;
	}

	let count = 0;
	function drawScene(img) {
		console.log('drawScene ' + count++);
		img.clear([0, 0, 0, 255]);
		for (let idx = 0; idx < points.length; ++idx) {
			points[idx].draw(img);
		}
		img.drawToCanvas();
	}

	function runCb(img) {
		if (updating) {
			update(img);
		}
		drawScene(img);
	}

	function start(nullData_) {
		//console.log('starting');
		updating = true;
		prevT = Date.now();
		runner.start();
	}

	function stopRedrawingCb(nullData_) {
		runner.stop();
		//console.log('stopped');
	}

	function stop(nullData_) {
		updating = false;
		stopTimer = new SingleShotTimer(stopRedrawingCb, 5000, null);
		//console.log('stopping...')
		stopTimer.start();
	}

	window.onload = function() {
		img = new Img('Orbit');
		repopulate();
		console.log('points: ' + points.length);
		update(img);
		drawScene(img);
		runner = new Runner(null, null, runCb, 100, img);
		start()
		//startTimer = new SingleShotTimer(start, 3000, null);
		//startTimer.start();
		//endTimer = new SingleShotTimer(stop, 13000, null);
		//endTimer.start();
	}
</script>

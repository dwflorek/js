<html>
<head>
<title>Noise Spheres</title>
<script src="mathutils.js"></script>
<script src="noise.js"></script>
<script src="myRandom.js"></script>
<script src="img.js"></script>
<script src="color.js"></script>
<script src="automation.js"></script>
<script src="ui.js"></script>
<script>
	const grayColor = [221, 221, 221];

	function getRandomColor() {
		const h = randomOn(0.0, 1.0);
		const s = randomOn(0.7, 1.0);
		const v = randomOn(0.4, 0.7);
		const rgb = hsvToRgb(h, s, v);
	        return [to8Bit(rgb[0]), to8Bit(rgb[1]), to8Bit(rgb[2]), 255];
	}

	function getRainbowColor(val) {
		// red at the top, magenta at the bottom, smooth colors between
		const redness = step(val, 0.1, 0.9);
		const h = 0.8167 + redness*(0.0 - 0.81677);
		const rgb = hsvToRgb(h, 1.0, 0.8);
	        return [to8Bit(rgb[0]), to8Bit(rgb[1]), to8Bit(rgb[2]), 255];
	}

	let img = null;
	let spheres=[];

	class Sphere {
		constructor(xCenter, yCenter, radius) {
			this.x = xCenter;
			this.y = yCenter;
			this.r = radius;
			this.c = [192, 192, 192];
		}

		setCenter(xCenter, yCenter) {
			this.x = xCenter;
			this.y = yCenter;
		}

		setRadius(radius) {
			this.r = radius;
		}

		setColor(color) {
			this.c = [color[0], color[1], color[2]];
		}

		surfacePoint(x, y) {
			// screen-space and pixel units: +px to the right, +py down, +pz towards viewer
			// phi is latitude: -pi/2 south/bottom pole, 0 equator, pi/2 north/top pole
			// theta is longitude: -pi/2 left edge, 0 center, pi/2 right edge
			let point = {};
			point.valid = true;
			point.px = x - this.x;
			point.py = y - this.y;
			point.rSqrd = point.px*point.px + point.py*point.py;
			point.r = Math.sqrt(point.rSqrd);
			if (point.r > this.r + 0.5) {
				point.valid = false;
				return point;
			}
			point.pz = Math.sqrt(clamp(this.r*this.r - point.rSqrd, 0.0, this.r*this.r));

			// px = r*cos(phi)*sin(theta), pz = r*cos(phi)*cos(theta), py = -r*sin(phi)
			// -> phi = asin(-py/r), theta = asin(px/(r*cos(phi)))
			point.phi = Math.asin(clamp(-point.py / this.r, -1.0, 1.0));
			point.v = (point.phi / Math.PI) + 0.5;
			point.theta = Math.asin(clamp(point.px / (this.r * Math.cos(point.phi)), -1.0, 1.0));
			point.u = 0.5 + point.theta / (2*Math.PI);
			return point;
		}
		
		colorForPoint(pt) {
			// a function of pixel location relative to center
			const alpha = 1.0 - step(pt.r, this.r - 0.5, this.r + 0.5);
			return [this.c[0], this.c[1], this.c[2], to8Bit(alpha)];
		}

		brightnessForPoint(pt) {
			// cheap matte illumination model
			const lightScale = 1.0 / Math.sqrt(1 + 9 + 4);
			const toLight = [1*lightScale, -3*lightScale, 2*lightScale];
			const dLen = Math.sqrt(pt.px*pt.px + pt.py*pt.py + pt.pz*pt.pz);
			const n = [pt.px/dLen, pt.py/dLen, pt.pz/dLen];
			const nDotL = n[0]*toLight[0] + n[1]*toLight[1] + n[2]*toLight[2];
			let brightness = 0.3;
			if (nDotL > 0.0) {
				brightness = brightness + 0.7*nDotL;
			}
			return brightness;
		}

		draw(img) {
			const rSqrdMax = (this.r + 0.5)*(this.r + 0.5);
			for (let py = (this.y - this.r - 1)>>0; py <= this.y + this.r + 1; ++py) {
				for (let px = (this.x - this.r - 1)>>0; px <= this.x + this.r + 1; ++px) {
					const pt = this.surfacePoint(px, py);
					if (! pt.valid) {
						continue;
					}
					const c = this.colorForPoint(pt);
					if (c[3] > 0) {
						const b = this.brightnessForPoint(pt);
						c[0] = (c[0]*b)>>0;
						c[1] = (c[1]*b)>>0;
						c[2] = (c[2]*b)>>0;
					}
					img.colorPixelXY(px, py, c);
				}
			}
		}
	}

	class NoiseSphere extends Sphere {
		constructor(xCenter, yCenter, radius) {
			super(xCenter, yCenter, radius);
		}

		setNoise(noise) {
			this.noise = noise;
		}

		setNoiseBaseFreq(f) {
			this.baseFreq = f;
		}

		setNoiseBaseAmpl(a) {
			this.baseAmpl = a;
		}

		evalNoise(pt) {
			const nx = this.baseFreq * pt.u;
			const noiseVal = this.noise.getValueAt(nx, 0.5, 0.5);
			const noiseScale = 1.0 - 2.0*Math.abs(pt.v - 0.5); // max offset at equator, zero at poles
			return this.baseAmpl * noiseScale * noiseVal;
		}

		colorForPoint(pt) {
			// a function of pixel location relative to center
			const alpha = 1.0 - step(pt.r, this.r - 0.5, this.r + 0.5);
			if (alpha == 0.0) {
				return [0, 0, 0, 0];
			}
			const noisyV = pt.v + 0.5*this.evalNoise(pt);
			const c = fadeColor(this.c, [192, 192, 192], 0.5 + 0.5*Math.cos(5*Math.PI*noisyV));
			return [c[0]>>0, c[1]>>0, c[2]>>0, to8Bit(alpha)];
		}
	}

	class RainbowSphere extends NoiseSphere {
		constructor(xCenter, yCenter, radius) {
			super(xCenter, yCenter, radius);
			this.h1 = randomOn(0.0, 1.0);
			this.h2 = this.h1 + randomOn(0.3, 0.9);
		}

		colorForPoint(pt) {
			const alpha = 1.0 - step(pt.r, this.r - 0.5, this.r + 0.5);
			if (alpha == 0.0) {
				return [0, 0, 0, 0];
			}
			const noisyV = pt.v + 0.5*this.evalNoise(pt);
			const fade = step(noisyV, 0.1, 0.9);
			const h = this.h1 + fade*(this.h2 - this.h1);
			const rgb = hsvToRgb(h, 1.0, 0.8);
		        return [to8Bit(rgb[0]), to8Bit(rgb[1]), to8Bit(rgb[2]), to8Bit(alpha)];
		}
	}

	class BandedSphere extends NoiseSphere {
		constructor(xCenter, yCenter, radius) {
			super(xCenter, yCenter, radius);
			this.redoColorBands();
		}

		redoColorBands() {
			this.numBands = randomOn(5, 10.99)>>0;
			this.bands = [];
			for (let b = 0; b < this.numBands; ++b) {
				this.bands[b] = getRandomColor();
			}
		}

		colorForPoint(pt) {
			const alpha = 1.0 - step(pt.r, this.r - 0.5, this.r + 0.5);
			if (alpha == 0.0) {
				return [0, 0, 0, 0];
			}
			const noisyV = pt.v + 0.5*this.evalNoise(pt);
			const b = noisyV * this.numBands;
			const band = b>>0;
			const f = b - band;
			let c = [192, 192, 192];
			if (f > 0.05 && f < 0.95) {
				c = this.bands[band];
			}
			return [c[0], c[1], c[2], to8Bit(alpha)];
		}
	}

// ---------------

	let ui = {};
	let runner = null;

	let sphereVs = [];

	function moveSpheres(dt) {
		for (let idx = 0; idx < spheres.length; ++idx) {
			const s = spheres[idx];
			let newX = s.x + sphereVs[idx][0]*dt;
			let newY = s.y + sphereVs[idx][1]*dt;
			if (newX < 0) {
				newX = -newX;
				sphereVs[idx][0] = randomOn(0, 20);
			}
			else if (newX > img.width()-1) {
				newX = 2*(img.width()-1) - newX;
				sphereVs[idx][0] = randomOn(-20, 0);
			}
			if (newY < 0) {
				newY = -newY;
				sphereVs[idx][1] = randomOn(0, 20);
			}
			else if (newY > img.height()-1) {
				newY = 2*(img.height()-1) - newY;
				sphereVs[idx][1] = randomOn(-20, 0);
			}
			s.setCenter(newX, newY);
		}
	}

	function drawScene(img) {
		img.clear([0, 0, 0, 255]);
		for (let idx = 0; idx < spheres.length; ++idx) {
			spheres[idx].draw(img);
		}
		img.drawToCanvas();
	}

	function resetCb(nullData_) {
		const noise = new Noise(64);
		spheres = [];
		sphereVs = [];
		const numSpheres = randomOn(3,8.99)>>0;
		for (let s = 0; s < numSpheres; ++s) {
			const sphereType = randomOn(0.0, 2.999)>>0;
			const x = randomOn(0, img.width()-1);
			const y = randomOn(0, img.height()-1);
			const r = randomOn(50, 150);
			if (sphereType == 0) {
				spheres[s] = new NoiseSphere(x, y, r);
				spheres[s].setColor(getRandomColor());
			} else if (sphereType == 1) {
				spheres[s] = new RainbowSphere(x, y, r);
			} else {
				spheres[s] = new BandedSphere(x, y, r);
			}
			spheres[s].setNoise(noise);
			spheres[s].setNoiseBaseFreq(randomOn(5, 20));
			spheres[s].setNoiseBaseAmpl(randomOn(0.5, 1.5));
			sphereVs[s] = [randomOn(-20,20), randomOn(-20,20)];
		}
		drawScene(img);
	}

	function runCb(img) {
		const currMsecs = Date.now();
		moveSpheres((currMsecs - lastMsecs)/1000.0);
		lastMsecs = currMsecs;
		drawScene(img);
	}

	function startCb(nullData_) {
		lastMsecs = Date.now();
		ui.runStopButton.updateState('Stop', stopCb);
		runner.start();
	}

	function stopCb(nullData_) {
		runner.stop();
		ui.runStopButton.updateState('Run', startCb);
	}

	let origCanvasWidth, origCanvasHeight;

	function fullscreenChanged(nullData_) {
		console.log('fullscreenChanged()');
		let canvas = document.getElementById('spheres');
		if (origCanvasWidth == undefined && origCanvasHeight == undefined) {
			console.log('going fullscreen...');
			console.log(`canvas size: ${canvas.width} x ${canvas.height}`);
			origCanvasWidth = canvas.width;
			origCanvasHeight = canvas.height;
			canvas.width = window.screen.width * window.devicePixelRatio;
			canvas.height = window.screen.height * window.devicePixelRatio;
		}
		else {
			console.log('is fullscreen, reverting...');
			canvas.width = origCanvasWidth;
			canvas.height = origCanvasHeight;
			origCanvasWidth = undefined;
			origCanvasHeight = undefined;
		}
		img.updateSize();
		drawScene(img);
	}

	function fullscreenCb(nullData_) {
		let canvas = document.getElementById('spheres');
		canvas.onfullscreenchange = fullscreenChanged;
		if (canvas.requestFullscreen) {
			canvas.requestFullscreen().catch(err => {
				console.error(`Error attempting to enable fullscreen: ${err.message}`);
			});
		}
	}

        function buildUI() {
		const div = document.getElementById('controls');

		ui.resetButton = new PushButton('button', 'clear', 'Reset', resetCb);
		ui.runStopButton = new PushButton('button', 'runStop', 'Run', startCb);
		ui.fullscreenButton = new PushButton('button', 'fullscreen', 'Full Screen', fullscreenCb);

                ui.resetButton.appendToElement(div);
                ui.runStopButton.appendToElement(div);
                div.appendChild(document.createElement('br'));
		ui.fullscreenButton.appendToElement(div);
	}

	window.onload = function() {
		img = new Img('spheres');
		buildUI();
		resetCb();
		runner = new Runner(null, null, runCb, 100, img);
	}
</script>

<body>
	<h1>Noise Spheres</h1>
	<div class="horiz" id="canvas">
		<canvas width="800" height="600" id="spheres"></canvas>
	</div>
	<div class="horiz" id="controls">
	</div>
</body>

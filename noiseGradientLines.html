<script>

        function getRandomColor() {
                const val = randomOn(0.4, 1.0);
                const sat = randomOn(0.7, 1.0);
                const hue = randomOn(0.0, 1.0);
                const rgb = hsvToRgb(hue, sat, val);
                return [to8Bit(rgb[0]), to8Bit(rgb[1]), to8Bit(rgb[2])]
        }               

	function scaleVector(v, s) {
		return [v[0]*s, v[1]*s, v[2]*s];
	}

	function innerProduct(v1, v2) {
		return v1[0]*v2[0] + v1[1]*v2[1] + v1[2]*v2[2];
	}

	function crossProduct(v1, v2) {
		return [
			v1[1]*v2[2] - v1[2]*v2[1],
			v1[2]*v2[0] - v1[0]*v2[2],
			v1[0]*v2[1] - v1[1]*v2[0]
		];
	}

	function normalize(v) {
		const lenSqrd = innerProduct(v, v);
		if (lenSqrd > 0.0) {
			return scaleVector(v, 1.0/Math.sqrt(lenSqrd));
		}
		return [0.0, 0.0, 0.0];
	}

	function vecAddScaled(v1, s1, v2, s2) {
		return [
			s1*v1[0] + s2*v2[0],
			s1*v1[1] + s2*v2[1],
			s1*v1[2] + s2*v2[2]
		];
	}

	function vecAddScaled3(v1, s1, v2, s2, v3, s3) {
		return [
			s1*v1[0] + s2*v2[0] + s3*v3[0],
			s1*v1[1] + s2*v2[1] + s3*v3[1],
			s1*v1[2] + s2*v2[2] + s3*v3[2]
		];
	}

	class Fractal {
		constructor() {
			this.noise = undefined;
			this.octaves = 1.0;
			this.baseFreq = 3.0;
			this.baseAmpl = 0.333;
			this.octaveFreqFactor = 2.0;
			this.octaveAmplFactor = 0.5;
			this.scaleFactor = 1.0;
		}

		setNoise(noise) {
			this.noise = noise;
		}

		setOctaves(o) {
			this.octaves = o;
		}

		setBaseFreq(f) {
			this.baseFreq = f;
		}

		setBaseAmpl(a) {
			this.baseAmpl = a;
		}
		setOctaveFreqFactor(ff) {
			this.octaveFreqFactor = ff;
		}

		setOctaveAmplFactor(af) {
			this.octaveAmplFactor = af;
		}

		setScaleFactor(sf) {
			this.scaleFactor = sf;
		}

		getValueAt(x, y, z) {
			let f = this.baseFreq;
			let a = this.baseAmpl;
			let val = 0.0;
			for (let i = 0; i < this.octaves; ++i) {
				// TODO: offset (x,y,z) for each octave
				val += a * this.noise.getValueAt(f*x, f*y, f*z);
				f *= this.octaveFreqFactor;
				a *= this.octaveAmplFactor;
			}
			return this.scaleFactor * val;
		}
	}

	class ColorServer {
		constructor() {
			this.colors = [];
		}

		repopulate() {
			this.colors = [];
			const numColors = randomOn(3, 11) >> 0;
			const minHue = randomOn(0.0, 1.0);
			const maxHue = minHue + randomOn(0.05, 0.3);
			const minSat = 0.7;
			const maxSat = 1.0;
			const minVal = 0.5;
			const maxVal = 1.0;
			for (let c = 0; c < numColors; ++c) {
				const hue = randomOn(minHue, maxHue);
				const sat = randomOn(minSat, maxSat);
				const val = randomOn(minVal, maxVal);
				const rgb = hsvToRgb(hue, sat, val);
				this.colors.push( [to8Bit(rgb[0]), to8Bit(rgb[1]), to8Bit(rgb[2]), 255] );
			}
		}

		getColor(x, y) {
			// x & y could be used e.g. to index into a 2D colormap (like a loaded image)
			if (this.colors.length == 0) {
				return [44, 44, 44, 255];
			}
			else {
				const c = randomOn(0, this.colors.length) >> 0;
				return this.colors[c];
			}
		}
	}

	class NoiseViewerBase {
		constructor() {
			this.noise = undefined;
			this.nz = 0.0;
			this.pixelSize = 0.01;
		}

		setNoise(noise) {
			this.noise = noise;
		}

		resetZ() {
			this.nz = 0.0;
		}

		updateZ() {
			this.nz += this.pixelSize;
		}

		setPixelSize(s) {
			this.pixelSize = s;
		}

		getNoiseVal(x, y) {
			return this.noise.getValueAt(x, y, this.nz);
		}
	}

	class NoiseGradientLines extends NoiseViewerBase {
		constructor() {
			super();
			this.coarseness = 20;
		}

		setCoarseness(c) {
			this.coarseness = c;
		}

		drawGradientLine(x, y, lengthInPixels, color) {
			const halfLen = lengthInPixels / 2.0;
			// forward
			let len = 0;
			let lineX = x;
			let lineY = y;
			let pixelX = x;
			let pixelY = y;
			while (len < halfLen) {
				// get gradient at next pixel
				const vx = this.getNoiseVal(pixelX + 3, pixelY + 11);
				const vy = this.getNoiseVal(pixelX + 8, pixelY + 5);
				if (vx == 0.0 && vy == 0.0) {
					// no movement into next pixel, quit now
					break;
				}
				const sgnvx = Math.sign(vx);
				const sgnvy = Math.sign(vy);
				// any point from the current line-pt in the gradient direction is
				// (nextX, nextY) = (lineX, lineY) + t * (vx, vy)
				// -> t = ((nextX, nextY) - (lineX, lineY)) / ((vx, vy)
				// distance to the next vertical edge
				let tx = 1.0e10; // or maxfloat or +inf
				let nextX = pixelX + sgnvx*0.5*this.pixelSize;
				if (sgnvx != 0) {
					tx = (nextX - lineX) / vx;
				}
				// distance to next horizontal edge
				let ty = 1.0e10;
				let nextY = pixelY  + sgn(vy)* 0.5*this.pixelSize;
				if (sgnvy != 0.0) {
					ty = (nextY - lineY) / vy;
				}
				// settle on point hit on nearer edge, update (pixelX, pixelY) to the one across that edge
				if (tx < ty) {
					// vertical edge: update nextY to nearer t
					nextY = lineY + tx * vy;
					pixelX = sgn(vx) * this.pixelSize;
				} else if (ty < tx) {
					// horizontal edge: update nextX to nearer t
					nextX = lineX + ty * vx;
					pixelY = sgn(vy) * this.pixelSize;
				}
				else {
					// corner: nextX and nextY are both correct already
					pixelX = sgn(vx) * this.pixelSize;
					pixelY = sgn(vy) * this.pixelSize;
				}
				// update corresponding pixel(s)

				// update length of line
				len += Math.sqrt((nextX - lineX)*(nextX - lineX) + (nextY - lineY)*(nextY - lineY));
				// update point along line
				lineX = nextX;
				lineY = nextY;
			}
		}
			
			
		draw(imgData, colors) {
			let pixelIndex = 0;
			let ny = (imgData.height-1)/2.0 * this.pixelSize;
			for (let y = 0; y < imgData.height; ++y) {
				let nx = -(imgData.width-1)/2.0 * this.pixelSize;
				for (let x = 0; x < imgData.width; ++x) {
					const nv = this.getNoiseVal(nx, ny);
					const color;
					if (this.colorMode == 'gray') {
						const val = (nv + 1) / 2.0;
						if (val < 0.0) {
							color = [255, 255, 255];
						} else if (val > 1.0) {
							color = [0, 0, 0];
						} else {
							let gray = val;
							if (!this.smooth) {
								const band = (10*gray)>>0;
								gray = band/9.0;
							}
							gray = to8Bit(0.2 + 0.6*gray);
							color = [gray, gray, gray];
						}
					}
					else if (this.colorMode == 'redBlue') {
						if (nv < -1.0) {
							color = [0, 0, 0];
						} else if (nv > 1.0) {
							color = [255, 255, 255];
						} else {
							if (nv > 0.0) {
								let val = nv;
								if (!this.smooth) {
									const band = (5*val)>>0;
									val = band/4.0;
								}
								const red = to8Bit(0.75);
								const other = to8Bit(val*0.6);
								color = [red, other, other];
							} else {
								let val = nv + 1.0;
								if (!this.smooth) {
									const band = (5*val)>>0;
									val = band/4.0;
								}
								const blue = to8Bit(0.5 + 0.25*val);
								const other = to8Bit(0.5*val);
								color = [other, other, blue];
							}
						}
					}
					else {
						const whichColor = Math.floor(
							this.colors.length * (nv + 1) / 2.0
						)>>0;
						if (whichColor < 0 || whichColor >= this.colors.length) {
							color = [255, 255, 255];
						} else {
							color = this.colors[whichColor];
						}
					}
					colorPixel(
						imgData, pixelIndex,
						[color[0]>>0, color[1]>>0, color[2]>>0, 255]);
					pixelIndex += 4;
					nx += this.pixelSize;
				}
				ny -= this.pixelSize;
			}
		}
	}

	class NoiseTerrain extends NoiseViewerBase {
		constructor() {
			super();
			this.shadeTerrain = false;
			this.shadeWater = true;
		}

		setShadeTerrain(val) {
			this.shadeTerrain = val;
		}

		setShadeWaterWithTerrain(val) {
			this.shadeWater = val;
		}

		draw(imgData) {
			const light = normalize([5.0, -10.0, 15.0]);
			let pixelIndex = 0;
			let ny = (imgData.height-1)/2.0 * this.pixelSize;
			for (let y = 0; y < imgData.height; ++y) {
				let nx = -(imgData.width-1)/2.0 * this.pixelSize;
				for (let x = 0; x < imgData.width; ++x) {
					const elev = this.getNoiseVal(nx, ny);
					//const colorOffset = this.noise.getValueAt(0.1*x, 0.1*y, 0.1*this.nz/this.pixelSize);
					const tcv = elev /* + 0.1*colorOffset */;
					let color;
					if (tcv < -0.5) {      color = [ 32,  48,  64]; }
					else if (tcv < -0.2) { color = [ 32,  96, 128]; }
					else if (tcv < 0.0) {  color = [ 32, 144, 192]; }
					else if (tcv < 0.1) {  color = [240, 240, 224]; }
					else if (tcv < 0.3) {  color = [192, 224, 128]; }
					else if (tcv < 0.5) {  color = [ 96, 144,  96]; }
					else if (tcv < 0.7) {  color = [ 64,  96,  32]; }
					else {                 color = [144, 144, 144]; }

					if (this.shadeTerrain && (elev > 0.0 || this.shadeWater)) {
						const elevEast = this.getNoiseVal(nx+this.pixelSize, ny);
						const dElevDx = [this.pixelSize, 0, elevEast - elev];
						const elevNorth = this.getNoiseVal(nx, ny+this.pixelSize);
						const dElevDy = [0, this.pixelSize, elevNorth - elev];
						const n = normalize(crossProduct(dElevDx, dElevDy));
						const nDotL = innerProduct(n, light);
						let illum = 0.6;
						if (nDotL > 0.0) {
							illum += nDotL * 0.4;
						}
						color = scaleColor(color, illum);
					}
					colorPixel(
						imgData, pixelIndex,
						[color[0]>>0, color[1]>>0, color[2]>>0, 255]);
					pixelIndex += 4;
					nx += this.pixelSize;
				}
				ny -= this.pixelSize;
			}
		}
	}

	class QAEBTerrain extends NoiseViewerBase {
		constructor() {
			super();
			this.camera = undefined
			this.row = -1;
			this.flatWater = false;
			this.includeFg = false;
			this.includeBg = false;
		}

		setFlatWater(val) {
			this.flatWater = val;
		}

		setIncludeForeground(val) {
			this.includeFg = val;
		}

		setIncludeBackground(val) {
			this.includeBg = val;
		}

		_createCamera(imgData) {
			const hFov = 40 * Math.PI/180.0;
			const camDownAng = 15 * Math.PI/180.0;
			// center of image is ray from cam to origin (where noise val is 0 by our impl),
			// x-extents at center-y correspond to +/- zoom/2. Cam-dist is so that we get
			// 40 degree horizontal FOV, looking from -y. Cam-height is so that we get the
			// desired down-angle.
			const worldWidthAtCenter = imgData.width * this.pixelSize;
			// tan(halfHFov) = halfWidth/camDist -> camDist = halfWidth/tan(halfHFov)
			const camDist = (worldWidthAtCenter/2.0) / Math.tan(hFov/2.0);
			const camP = [0.0, -camDist * Math.cos(camDownAng), camDist * Math.sin(camDownAng)];
			const camV = normalize([-camP[0], -camP[1], -camP[2]]);
			const camRight = [1.0, 0.0, 0.0];
			const camUp = crossProduct(camRight, camV);
			const stepFactor = 1.0 + this.pixelSize/camDist;
			return {
				"d": camDist,
				"p": camP,
				"v": camV,
				"right": camRight,
				"up": camUp,
				"fwd": stepFactor,
				"back": 1.0/stepFactor
			};
		}

		_rayFor(imgData, cam, x, y) {
			const dx = x - (imgData.width - 1)/2.0;
			const dy = y - (imgData.height - 1)/2.0;
			return normalize(vecAddScaled3(cam.v, cam.d, cam.right, dx*this.pixelSize, cam.up, -dy*this.pixelSize));
		}

		_elevAtXY(x, y) {
			return this.noise.getValueAt(x, y, this.nz);
		}

		_intersectTerrain(p, v, startD, endD, dFactor) {
			let prevD = 0.0;
			let prevZ = p[2];
			let prevElev = this._elevAtXY(p[0], p[1]);

			let d = startD;
			let testP = vecAddScaled(p, 1.0, v, d); // p + d*v
			let elev = this._elevAtXY(testP[0], testP[1]);

			let height = elev;
			if (this.flatWater && elev < 0.0) {
				height = 0.0;
			}

			while (d < endD && testP[2] > height) {
				prevD = d;
				prevZ = testP[2];
				prevElev = elev;

				d *= dFactor;
				testP = vecAddScaled(p, 1.0, v, d); // p + d*v
				elev = this._elevAtXY(testP[0], testP[1]);
				height = elev;
				if (this.flatWater && elev < 0.0) {
					height = 0.0;
				}
			}
			if (testP[2] > height) {
				// stayed above terrain, assume we're hitting "sky"
				return undefined;
			}

			let intersectionD;
			let intersectionP;
			let intersectionN;
			let intersectionE;
			if (d == startD && testP[2] < elev) {
				// started out below terrain, might render as "near wall"
				intersectionD = startD;
				intersectionP = testP;
				intersectionN = undefined;
				intersectionE = elev;
			}
			else if (this.flatWater && height > elev) {
				// intersection is at distance d such that (p + dv)[z] == 0.0
				intersectionD = (0.0 - p[2]) / v[2];
				intersectionP = vecAddScaled(p, 1.0, v, intersectionD);
				intersectionN = normalize([-v[0], -v[1], -v[2]]); // fake normal
				intersectionE = this._elevAtXY(intersectionP[0], intersectionP[1]);
				
			}
			else {
				// 1-D intersection between ray-segment and terrain line-segment
				// at distance d1, ray height z1 is above terrain elevation e1, at
				// d2, z2 is below e2. These four points (z(d1), e(d1), z(d2), e(d2))
				// define two intersecting segments, the intersection is at (with some
				// trivial manipulation):
				intersectionD = prevD +
					((prevZ - prevElev) / ((elev - prevElev) - (testP[2] - prevZ)))*(d - prevD);
				intersectionP = vecAddScaled(p, 1.0, v, intersectionD);

				// now approximate a surface normal by finding points on the surface
				// "in front of" and "to the right of" this point, and computing the
				// cross-product of the resulting "in surface" vectors
				const vF = [v[0],  v[1], 0.0];
				const vR = [v[1], -v[0], 0.0];
				const pixelSize = intersectionD * (dFactor - 1.0);
				let pF = vecAddScaled(intersectionP, 1.0, vF, pixelSize);
				pF[2] = this._elevAtXY(pF[0], pF[1]);
				let pR = vecAddScaled(intersectionP, 1.0, vR, pixelSize);
				pR[2] = this._elevAtXY(pR[0], pR[1]);
				const vToF = vecAddScaled(pF, 1.0, intersectionP, -1.0); 
				const vToR = vecAddScaled(pR, 1.0, intersectionP, -1.0); 
				intersectionN = normalize(crossProduct(vToR, vToF));
				intersectionE = this._elevAtXY(intersectionP[0], intersectionP[1]);
			}

			return {
				"d": intersectionD,
				"p": intersectionP,
				"n": intersectionN,
				"e": intersectionE
			};
		}

		// renders the next row; returns true if there are more rows to render, otherwise false
		drawNextRow(imgData) {
			const light = normalize([5.0, -10.0, 15.0]);
			// render from bottom to top, for efficiency: next row up will be farther than this row,
			// once an entire row is empty, all rows above will also be empty
			if (this.row < 0) {
				this.camera = this._createCamera(imgData);
				console.log(`camera p [${this.camera.p}], v [${this.camera.v}], right [${this.camera.right}], up [${this.camera.up}], d ${this.camera.d}, fwd ${this.camera.fwd}`);
				this.row = imgData.height - 1;
				this.rowStartDs = new Array(imgData.width).fill(0.1);
			}

			// console.log(`row ${this.row}`);
			let pixelIndex = this.row * imgData.width * 4;
			let terrainFound = false;

			for (let x = 0; x < imgData.width; ++x) {
				const ray = this._rayFor(imgData, this.camera, x, this.row);
				// start for this pixel is two steps back from intersection for previous row
				const prevD = this.rowStartDs[x];
				if (prevD < 0.0) {
					// sky in this columm, from this row on
					pixelIndex += 4;
					continue;
				}
				const farY = (imgData.height - 1)/2.0 * this.pixelSize;
				const nearY = -1.0 * farY;
				let startD = prevD * this.camera.back * this.camera.back;
				if (!this.includeFg) {
					// startD = d where (p + dv)[y] = -(imgData.height-1)/2.0 * this.pixelSize
					const d1 = (nearY - this.camera.p[1]) / ray[1];
					startD = Math.max(d1, startD);
				}
				let endD = 100.0;
				if (!this.includeBg) {
					const d2 = (farY - this.camera.p[1]) / ray[1];
					endD = Math.min(d2, endD);
				}

				if (x == 400) {
					if (this.row == imgData.height - 1) {
						console.log(`includeFg=${this.includeFg}, includeBg=${this.includeBg}`);
					}
					console.log(`y=${this.row}, v=[${ray}], prevD=${prevD}, nearY=${nearY}, farY=${farY}, startD=${startD}, endD=${endD}`);
				}
				
				const i = this._intersectTerrain(this.camera.p, ray, startD, endD, this.camera.fwd);
				if (i === undefined) {
					// missed terrain -> sky for this column, from this row on
					this.rowStartDs[x] = -1.0;
					pixelIndex += 4;
					continue;
				}

				if (x == 400 && this.row % 50 == 49) {
					console.log(`(${x},${this.row}): intersection d ${i.d}, p [${i.p}]`);
				}

				if (i.d == startD) {
					// beneath terrain at start
					colorPixel(imgData, pixelIndex, [64, 64, 64, 255]);
					pixelIndex += 4;
					continue;
				}

				terrainFound = true;
				this.rowStartDs[x] = i.d;

				const elev = i.e;
				const tcv = elev;  // + 0.1*colorOffset
				let color;
				if (tcv < -0.5) {      color = [ 32,  48,  64]; }
				else if (tcv < -0.2) { color = [ 32,  96, 128]; }
				else if (tcv < 0.0) {  color = [ 32, 144, 192]; }
				else if (tcv < 0.1) {  color = [240, 240, 224]; }
				else if (tcv < 0.3) {  color = [192, 224, 128]; }
				else if (tcv < 0.5) {  color = [ 96, 144,  96]; }
				else if (tcv < 0.7) {  color = [ 64,  96,  32]; }
				else {                 color = [144, 144, 144]; }

				if (!this.flatWater || elev > 0.0) {
					const nDotL = innerProduct(i.n, light);
					let illum = 0.6;
					if (nDotL > 0.0) {
						illum += nDotL * 0.4;
					}
					color = scaleColor(color, illum);
				}

				colorPixel(imgData, pixelIndex, [color[0]>>0, color[1]>>0, color[2]>>0, 255]);
				pixelIndex += 4;
			}

			this.row -= 1;
			if (! terrainFound) {
				// we're done, set row past the top so we restart the next time
				this.row = -1;
			}
			return (this.row >= 0);
		}
	}

	function scaleColor(c, s) {
		return [c[0]*s, c[1]*s, c[2]*s];
	}

	function addColor(c1, c2) {
		return [c1[0]+c2[0], c1[1]+c2[1], c1[2]+c2[2]];
	}

	function mixColor(c1, s1, c2, s2) {
		return addColor(scaleColor(c1, s1), scaleColor(c2, s2));
	}

	function fadeColor(c1, c2, t) {
		// c = c1 + t(c2 - c1);
		// return c1*(1-t) + c2*t;
		return mixColor(c1, 1.0-t, c2, t);
	}

	function colorPixel(imageData, pixelIndex, color) {
                imageData.data[pixelIndex] = color[0];
                imageData.data[pixelIndex+1] = color[1];
                imageData.data[pixelIndex+2] = color[2];
                imageData.data[pixelIndex+3] = color[3];
	}
		
	function clearImage(imageData, color) {
		var row, col, pidx;
		pidx = 0;
		for (row = 0; row < imageData.height; ++row) {
			for (col = 0; col < imageData.width; ++col) {
				colorPixel(imageData, pidx, color);
				pidx += 4;
			}
		}
	}

	let ctx;
	let imgData;
	let fractal;
	let noiseView;
	let noiseTerrain;
	let qaebTerrain;
	let viewer;

	function refreshNoise() {
		const noise = new Noise(64);
		fractal.setNoise(noise);
		noiseView.setNoise(fractal);
		noiseTerrain.setNoise(fractal);
		qaebTerrain.setNoise(fractal);
	}

	function initImage() {
		const canvas = document.getElementById('noise');
		ctx = canvas.getContext('2d');
		imgData = ctx.createImageData(canvas.width, canvas.height); // match to canvas (for now)
	}

	function initViewers() {
		fractal = new Fractal();
		noiseView = new NoiseView();
		noiseTerrain = new NoiseTerrain();
		qaebTerrain = new QAEBTerrain();
		refreshNoise();
	}

	function clearScene() {
		clearImage(imgData, [0, 0, 0, 255]); // [34, 22, 84, 255]);
		ctx.putImageData(imgData, 0, 0);
	}

	function drawRow(imgData) {
		let keepDrawing = qaebTerrain.drawNextRow(imgData);
		if (viewer !== qaebTerrain) {
			return;
		}
		ctx.putImageData(imgData, 0, 0);
		if (keepDrawing) {
			setTimeout(drawRow, 0, imgData);
		}
	}

	function drawScene() {
		if (viewer === qaebTerrain) {
			setTimeout(drawRow, 0, imgData);
		} else {
			viewer.draw(imgData);
			ctx.putImageData(imgData, 0, 0);
		}
	}
	
	function refreshNoiseAndRedraw() {
		stopRunning();
		const noise = new Noise(64);
		fractal.setNoise(noise);
		drawScene();
	}

	function update() {
		stopRunning();

		fractal.setOctaves(Number(ui.numOctaves.getContent())>>0);
		fractal.setBaseFreq(Number(ui.baseFreq.getContent()));
		fractal.setOctaveFreqFactor(Number(ui.freqFactor.getContent()));
		fractal.setBaseAmpl(Number(ui.baseAmpl.getContent()));
		fractal.setOctaveAmplFactor(Number(ui.amplFactor.getContent()));
		fractal.setScaleFactor(Number(ui.scaleFactor.getContent()));

		noiseView.resetZ();
		noiseTerrain.resetZ();
		qaebTerrain.resetZ();
		const pixelSize = 2.0 / Math.min(imgData.width, imgData.height);
		noiseView.setPixelSize(pixelSize);
		noiseTerrain.setPixelSize(pixelSize);
		qaebTerrain.setPixelSize(pixelSize);

		const selectedRadioButton = ui.viewerRadioButtons.selectedButton();
		const selectedVal = selectedRadioButton.getAttribute('value');
		updateViewer(selectedVal);
		drawScene();
	}

	function updateAndDraw() {
		noiseView.updateZ();
		noiseTerrain.updateZ();
		qaebTerrain.updateZ();
		drawScene();
	}

	let isRunning = false;
	let redrawTimer = null;

	function updateGoButton() {
		if (isRunning) {
			ui.goStopButton.updateState('Stop', stopRunning);
		} else {
			ui.goStopButton.updateState('Run', startRunning);
		}
	}

	function startRunning() {
		if (!isRunning) {
			isRunning = true;
			updateGoButton();
			redrawTimer = setInterval(updateAndDraw, 250);
		}
	} 

	function stopRunning() {
		if (isRunning) {
			isRunning = false;
			clearInterval(redrawTimer);
			redrawTimer = null;
			updateGoButton();
		}
	}

	function updateViewer(radioButtonVal) {
		if (radioButtonVal == 'falseColor') {
			ui.falseColorOpts.style.display = 'block';
			ui.terrainColorOpts.style.display = 'none';
			ui.rayMarchOpts.style.display = 'none';
			viewer = noiseView;
		} else if (radioButtonVal == 'terrainColor') {
			ui.falseColorOpts.style.display = 'none';
			ui.terrainColorOpts.style.display = 'block';
			ui.rayMarchOpts.style.display = 'none';
			viewer = noiseTerrain;
		} else {
			ui.falseColorOpts.style.display = 'none';
			ui.terrainColorOpts.style.display = 'none';
			ui.rayMarchOpts.style.display = 'block';
			viewer = qaebTerrain;
		}
	}

	function viewerTypeChanged(event) {
		if (event.target.name == 'viewer_type') {
			stopRunning();
			updateViewer(event.target.value);
		}
		clearScene();
		drawScene();
	}

	function falseColorModeChanged(event) {
		if (event.target.name == 'falseColor_mode') {
			noiseView.setColorMode(event.target.value);
		}
		drawScene();
	}

	function smoothColorsClicked(event) {
		noiseView.smoothColors(ui.smoothColorsOption.isChecked());
		drawScene();
	}

	function refreshFalseColors() {
		noiseView.refreshFalseColors();
		drawScene();
	}

	function shadingClicked(event) {
		noiseTerrain.setShadeTerrain(event.target.checked);
		drawScene();
	}

	function flatWaterClicked(event) {
		noiseTerrain.setShadeWaterWithTerrain(!event.target.checked);
		drawScene();
	}

	function rayMarchFlatWaterClicked(event) {
		qaebTerrain.setFlatWater(event.target.checked);
		drawScene();
	}

	function includeFgClicked(event) {
		qaebTerrain.setIncludeForeground(event.target.checked);
		drawScene();
	}

	function includeBgClicked(event) {
		qaebTerrain.setIncludeBackground(event.target.checked);
		drawScene();
	}

	let ui = {};

	function uiNoiseDiv() {
		const div = document.createElement('div');
		div.setAttribute('class', 'mainDiv');
		ui.numOctaves = new TextEntry('textField', 'octaves', 1, 'Number of octaves');
		ui.baseFreq = new TextEntry('textField', 'baseFreq', 3.0, 'Base frequency (inverse of zoom)');
		ui.freqFactor = new TextEntry('textField', 'freqFactor', 2.0, 'Frequency multiplier');
		ui.baseAmpl = new TextEntry('textField', 'baseAmpl', 0.333, 'Base amplitude)');
		ui.amplFactor = new TextEntry('textField', 'amplFactor', 0.5, 'Amplitude multiplier');
		ui.updateButton = new PushButton('button', 'update', 'Update', update);
		ui.refreshNoiseButton = new PushButton('button', 'refresh_noise', 'Refresh Noise', refreshNoiseAndRedraw);
		ui.numOctaves.appendToElement(div);
		ui.baseFreq.appendToElement(div);
		ui.freqFactor.appendToElement(div);
		ui.baseAmpl.appendToElement(div);
		ui.amplFactor.appendToElement(div);
		div.appendChild(document.createElement('br'));
		ui.updateButton.appendToElement(div);
		ui.refreshNoiseButton.appendToElement(div);
		return div;
	}

	function uiFalseColorViewerOpts() {
		const div = document.createElement('div');
		div.setAttribute('class', 'optsDiv');
		ui.falseColorRadioButtons = new RadioButtonGroup(
			'radiobutton',
			'falseColor_mode',
			[
				{'id': 'redBlue_rb', 'text': 'Red/Blue', 'value': 'redBlue'},
				{'id': 'gray_rb', 'text': 'Gray', 'value': 'gray'},
				{'id': 'random_rb', 'text': 'Random', 'value': 'random'}
			],
			falseColorModeChanged);
		ui.falseColorRefreshButton = new PushButton('button', 'refreshColors', 'Refresh Colors', refreshFalseColors);
		ui.smoothColorsOption = new Checkbox('checkbox', 'smoothColors_cb', 'Smooth colors', smoothColorsClicked);

		ui.falseColorRadioButtons.appendToElement(div);
		ui.falseColorRefreshButton.appendToElement(div);
		div.appendChild(document.createElement('br'));
		ui.smoothColorsOption.appendToElement(div);
		return div;
	}

	function uiTerrainColorViewerOpts() {
		const div = document.createElement('div');
		div.setAttribute('class', 'optsDiv');
		ui.shadingOption = new Checkbox('checkbox', 'shading_cb', 'Enable shading', shadingClicked);
		ui.flatWaterOption = new Checkbox('checkbox', 'flatWataer_cb', 'Keep water flat', flatWaterClicked);

		ui.shadingOption.appendToElement(div);
		ui.flatWaterOption.appendToElement(div);
		return div;
	}

	function uiRayMarchViewerOpts() {
		const div = document.createElement('div');
		div.setAttribute('class', 'optsDiv');
		ui.rayMarchFlatWaterOption = new Checkbox('checkbox', 'rayMarchFlatWater_cb', 'Flat water', rayMarchFlatWaterClicked);
		ui.includeFgOption = new Checkbox('checkbox', 'includeFg_cb', 'Include foreground', includeFgClicked);
		ui.includeBgOption = new Checkbox('checkbox', 'includeBg_cb', 'Include background', includeBgClicked);

		ui.rayMarchFlatWaterOption.appendToElement(div);
		ui.includeFgOption.appendToElement(div);
		ui.includeBgOption.appendToElement(div);
		return div;
	}

	function uiViewerDiv() {
		const div = document.createElement('div');
		div.setAttribute('class', 'mainDiv');
		ui.viewerRadioButtons = new RadioButtonGroup(
			'radiobutton',
			'viewer_type',
			[
				{'id': 'falseColor_rb', 'text': 'False Colored', 'value': 'falseColor'},
				{'id': 'terrainColor_rb', 'text': 'Terrain Colored', 'value': 'terrainColor'},
				{'id': 'qaebTerrain_rb', 'text': 'Ray Marched', 'value': 'qaebTerrain'}
			],
			viewerTypeChanged);
		ui.falseColorOpts = uiFalseColorViewerOpts();
		ui.terrainColorOpts = uiTerrainColorViewerOpts();
		ui.rayMarchOpts = uiRayMarchViewerOpts();

		ui.viewerRadioButtons.appendToElement(div);
		div.appendChild(document.createElement('br'));
		div.appendChild(ui.falseColorOpts);
		div.appendChild(ui.terrainColorOpts);
		div.appendChild(ui.rayMarchOpts);
		return div;
	}

	function buildUI() {
		noiseDiv = uiNoiseDiv();
		viewerDiv = uiViewerDiv();

		ui.scaleFactor = new TextEntry('textField', 'scaleFactor', 2.8, 'Color scale factor (map noise to [-1,1])');
		ui.goStopButton = new PushButton('button', 'go_stop', '');

		const controlsDiv = document.getElementById('controls');
		controlsDiv.appendChild(noiseDiv);
		controlsDiv.appendChild(viewerDiv);
		ui.scaleFactor.appendToElement(controlsDiv);
		ui.goStopButton.appendToElement(controlsDiv);

		ui.viewerRadioButtons.selectButtonWithAttribute('value', 'falseColor');
		ui.falseColorRadioButtons.selectButtonWithAttribute('value', 'random');
	}

	function initFromParams() {
	}
	
	window.onload = function() {
		buildUI();
		initFromParams();
		updateGoButton();
		initImage();
		initViewers();
		clearScene();
		update();
	}
</script>

		border: 1px solid #aaaaaa;
		padding: 5px 10px;

		background-color: #555555;
	}

		background-color: #666666;

		float: left;
	}

		margin-right: 10px;

</style>
</head>
<body>
	<h1>Noise</h1>
	<div class="horiz" id="canvas">
		<canvas width="800" height="600" id="noise"></canvas>
	</div>

	</div>
</body>
